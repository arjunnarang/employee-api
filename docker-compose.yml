version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: employee-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dummypassword
      MYSQL_DATABASE: employee_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    image: employee_api_image
    container_name: employee_api_image_container
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/employee_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: dummypassword

volumes:
  mysql_data: